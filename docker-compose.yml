name: emails-self-hosted

services:
  emails-serve:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${EMAILS_PORT:-8080}:8080"
    environment:
      EMAILS_MODE: self_hosted
      EMAILS_DATABASE_URL: "postgresql://${EMAILS_POSTGRES_USER:-emails}:${EMAILS_POSTGRES_PASSWORD:?set EMAILS_POSTGRES_PASSWORD}@db:5432/${EMAILS_POSTGRES_DB:-emails}?sslmode=disable"
      EMAILS_API_SIGNING_KEY: "${EMAILS_API_SIGNING_KEY:?set EMAILS_API_SIGNING_KEY (32+ characters)}"
      EMAILS_SEND_PROVIDER: "${EMAILS_SEND_PROVIDER:-ses}"
      EMAILS_AWS_REGION: "${EMAILS_AWS_REGION:-us-east-1}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      HOST: 0.0.0.0
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "bun src/cli/index.tsx db migrate && exec bun src/server/index.ts"]

  db:
    image: postgres:16.4-alpine3.20
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${EMAILS_POSTGRES_USER:-emails}"
      POSTGRES_PASSWORD: "${EMAILS_POSTGRES_PASSWORD:?set EMAILS_POSTGRES_PASSWORD}"
      POSTGRES_DB: "${EMAILS_POSTGRES_DB:-emails}"
    volumes:
      - emails-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EMAILS_POSTGRES_USER:-emails} -d ${EMAILS_POSTGRES_DB:-emails}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  emails-postgres:
